train_test_split: 0.8      # 80% train, 20% test; stratified by is_relevant
cv_folds: 5
cv_random_state: 42

ridge:
  alpha_grid: [0.01, 0.1, 1.0, 10.0, 100.0]
  default_alpha: 1.0
  normalize_inputs: true    # StandardScaler fit on train split only

logistic:
  C_grid: [0.01, 0.1, 1.0, 10.0, 100.0]
  default_C: 1.0
  max_iter: 1000
  solver: lbfgs
  normalize_inputs: true

# Metrics reported per probe
regression_metric: r2
classification_metric: auroc

# Bootstrap confidence intervals
bootstrap_n: 1000
bootstrap_ci: 0.95
