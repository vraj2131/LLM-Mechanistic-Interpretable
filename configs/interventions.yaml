# Alpha magnitudes for probe-direction steering
# Applied as: hidden[:, token_pos, :] += alpha_mult * w  (raw probe weight vector)
# Signed: positive steers toward feature, negative steers away
alpha_multipliers: [-5.0, -3.0, -1.0, 1.0, 3.0, 5.0]

# Layers to run interventions on (updated from probing results — 17 is confirmed peak)
probe_intervention_layers: [7, 17, 21]

# Probe targets to steer (highest IR relevance from Phase 6)
probe_targets: [is_relevant, lexical_overlap, bm25_score]

# SAE feature steering (layer 17, top is_relevant-correlated features)
sae_layer: 17
sae_steering_alpha_multipliers: [1.0, 3.0, 5.0]

# Output collapse detection — flag if std(scores) < collapse_std_threshold after intervention
collapse_std_threshold: 0.05

# Statistical testing
significance_level: 0.05    # paired t-test p-value threshold
